<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projeto escolar de informática do Colégio Técnico Industrial Prof. Isaac Portal Roldán chamado Pocket Slimes">
    <!-- <link rel="icon" href="" type="image/png"> -->
    <link rel="stylesheet" href="css/geral.css">
    <link rel="stylesheet" href="css/cartas.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/solid.min.css">

    <title>Pocket Slimes</title>
</head>

<body>
    <header>
        <a href="index.html" id="logo">
            <img src="imagens/logo_provisoria.png" alt="Logo do projeto Pocket Slimes">
        </a>
        <nav id="menus">
            <a href="index.html">
                <i class="fa-solid fa-house"></i>
                <p>Início</p>
            </a>
            <a href="tutoriais.html">
                <i class="fa-solid fa-gamepad"></i>
                <p>Tutoriais</p>
            </a>
            <a href="cartas.html" id="ativo">
                <i class="fa-solid fa-images"></i>
                <p>Cartas</p>
            </a>
        </nav>
    </header>

    <h1>Cartas do Pocket Slimes</h1>
    <h2>Veja todas as cartas do jogo e monte seu deck!</h2>

    <nav id="filtros">
        <button id="todos" type="button">
            <i class="fa-solid fa-table-cells-large"></i>
            <p>Todas as cartas</p>
        </button>

        <button id="slimes" type="button">
            <i class="fa-solid fa-droplet"></i>
            <p>Slimes</p>
        </button>

        <button id="itens" type="button">
            <i class="fa-solid fa-flask"></i>
            <p>Itens</p>
        </button>

        <button id="acoes" type="button">
            <i class="fa-solid fa-bolt"></i>
            <p>Ações</p>
        </button>

        <button id="ferramentas" type="button">
            <i class="fa-solid fa-screwdriver-wrench"></i>
            <p>Ferramentas</p>
        </button>
    </nav>

    <section id="catalogo"></section>
    
    <section id="carta-ampliada"></section>

    <script src="js/cartas.js"></script>
</body>
</html>
